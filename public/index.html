<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0E0D10" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#F7F3EB" media="(prefers-color-scheme: light)" />
  <meta name="description" content="Vivek Kaushal — builds agentic systems at Enterpret. Writes on AI, product, and attention. Formerly: cognitive science labs at IIIT Hyderabad and NTU Taiwan." />
  <meta name="robots" content="index, follow" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="canonical" href="https://vivekkaushal.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>Vivek Kaushal</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; background: #F7F3EB; color: #141414; }
    @media (prefers-color-scheme: dark) {
      html:not([data-theme='light']), html:not([data-theme='light']) body {
        background: #0E0D10; color: #EDE7DB;
      }
    }
    html[data-theme='dark'], html[data-theme='dark'] body {
      background: #0E0D10; color: #EDE7DB;
    }
    html[data-theme='light'], html[data-theme='light'] body {
      background: #F7F3EB; color: #141414;
    }
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <form name="talk" method="post" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="talk" />
    <p>
      <label>Contact <input type="text" name="contact" /></label>
    </p>
    <p>
      <label>Message <textarea name="message"></textarea></label>
    </p>
    <p hidden>
      <label>Don't fill this out if you're human: <input name="bot-field" /></label>
    </p>
  </form>
</body>

</html>
